name: FlashAttention-ROCm

permissions: {}

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      FLASH_ATTENTION_VERSION:
        description: "FlashAttention version"
        required: true
        default: "v2.8.3"
        type: string
  release:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  plan-matrix:
    name: Plan FlashAttention ROCm build matrix
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    permissions:
      contents: read # for actions/checkout
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v6

      - name: Generate build matrix
        id: generate-matrix
        run: |
          echo "matrix=$(uv run --script plan-matrix-rocm.py)" >> $GITHUB_OUTPUT

  build-wheels:
    name: Build Wheel
    needs: [plan-matrix]
    runs-on: ${{ matrix.RUNNER }}
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}

    permissions:
      contents: write
      actions: write

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan-matrix.outputs.matrix) }}

    steps:
      - name: Determine FlashAttention version
        id: flash-attention-version
        run: |
          # Extract FlashAttention version from tag. Tags can be either:
          # - v2.8.3 (legacy format; maps directly to FlashAttention version)
          # - v2.8.3-r1 (new format; strip -rN suffix to get FlashAttention version)
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            TAG="${GITHUB_REF_NAME}"
            # Remove -rN suffix if present
            FLASH_ATTENTION_VERSION="${TAG%-r*}"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            FLASH_ATTENTION_VERSION="${INPUTS_FLASH_ATTENTION_VERSION}"
          else
            FLASH_ATTENTION_VERSION="v2.8.3"
          fi
          echo "version=${FLASH_ATTENTION_VERSION}" >> $GITHUB_OUTPUT
          echo "Using FlashAttention version: ${FLASH_ATTENTION_VERSION}"
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          INPUTS_FLASH_ATTENTION_VERSION: ${{ inputs.FLASH_ATTENTION_VERSION }}

      - name: Checkout Flash Attention ROCm
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: ROCm/flash-attention
          ref: main
          persist-credentials: false

      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.13"

      - name: Checkout utils
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          path: build_scripts
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v6
        with:
          enable-cache: false

      - name: Set ROCm and PyTorch versions
        run: |
          echo "MATRIX_ROCM_VERSION=$(echo ${{ matrix.MATRIX_ROCM_VERSION }})" >> $GITHUB_ENV
          echo "MATRIX_TORCH_VERSION=$(echo ${{ matrix.MATRIX_TORCH_VERSION }})" >> $GITHUB_ENV
          echo "MATRIX_PYTHON_VERSION=$(echo ${{ matrix.MATRIX_PYTHON_VERSION }})" >> $GITHUB_ENV
          echo "MANYLINUX_ROCM_VERSION=$(echo ${{ matrix.MANYLINUX_ROCM_VERSION }})" >> $GITHUB_ENV
          echo "MANYLINUX_GLIBC_VERSION=$(echo ${{ matrix.MANYLINUX_GLIBC_VERSION }})" >> $GITHUB_ENV
          echo "CI_AUDITWHEEL_EXCLUDES=$(echo ${{ matrix.CI_AUDITWHEEL_EXCLUDES }})" >> $GITHUB_ENV

      - name: Install cibuildwheel
        run: |
          uv venv --python 3.13
          uv pip install cibuildwheel

      - name: Build wheels for FlashAttention ${{ matrix.torch-version }}+rocm${{ matrix.rocm-version }}
        run: |
          .venv/bin/cibuildwheel --output-dir dist
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.target-arch }}
          CIBW_BUILD: cp${{ env.MATRIX_PYTHON_VERSION }}-*64
          CIBW_MANYLINUX_X86_64_IMAGE: pytorch/manylinux-builder:rocm${{ env.MANYLINUX_ROCM_VERSION }}
          CIBW_BEFORE_ALL: >
            curl -LsSf https://astral.sh/uv/install.sh | sh
          CIBW_BEFORE_BUILD_LINUX: >
            uv pip install typing-extensions==4.12.2 setuptools wheel ninja psutil build &&
            uv pip install --no-cache-dir torch==${{ matrix.torch-version }} --index-url https://download.pytorch.org/whl/rocm${MANYLINUX_ROCM_VERSION}
          CIBW_ENVIRONMENT: >
            PATH=$PATH:/root/.local/bin:/opt/rocm/bin
            ROCM_HOME="/opt/rocm"
            ROCM_PATH="/opt/rocm"
            HIP_PATH="/opt/rocm/hip"
            LIBRARY_PATH="/usr/lib64"
            LD_LIBRARY_PATH="/usr/lib64:/opt/rocm/lib:/opt/rocm/lib64"
            AUDITWHEEL_PLAT="manylinux_${{ env.MANYLINUX_GLIBC_VERSION }}_$(uname -m)"
            MATRIX_ROCM_VERSION=${{ env.MATRIX_ROCM_VERSION }}
            MANYLINUX_ROCM_VERSION=${{ env.MANYLINUX_ROCM_VERSION }}
            MATRIX_TORCH_VERSION=${{ env.MATRIX_TORCH_VERSION }}
            MATRIX_PYTHON_VERSION=${{ env.MATRIX_PYTHON_VERSION }}
            FLASH_ATTENTION_FORCE_BUILD="TRUE"
            FLASH_ATTENTION_FORCE_CXX11_ABI=${{ matrix.cxx11-abi }}
            BUILD_TARGET="rocm"
            PYTORCH_ROCM_ARCH="gfx90a;gfx942"
            GPU_ARCHS="gfx90a;gfx942"
            MAX_JOBS=8
            UV_PYTHON=/opt/python/cp${{ env.MATRIX_PYTHON_VERSION }}-cp${{ env.MATRIX_PYTHON_VERSION }}/bin/python
            CI_AUDITWHEEL_EXCLUDES="${{ env.CI_AUDITWHEEL_EXCLUDES }}"
          CIBW_SKIP: "*musllinux*"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair -w /tmp/cibuildwheel/repaired_wheel {wheel} ${CI_AUDITWHEEL_EXCLUDES}"
          CIBW_BUILD_FRONTEND: "build[uv]; args: --no-isolation"

      - name: Log Built Wheels
        run: |
          wheel_name=$(ls dist/*whl | xargs -n 1 basename)
          echo "wheel_name=${wheel_name}" >> $GITHUB_ENV
          ls dist

      - name: Rename wheel
        run: |
          tmpname=rocm${{ matrix.rocm-version }}torch${{ matrix.torch-version }}cxx11abi${{ matrix.cxx11-abi }}
          wheel_name=$(ls dist/*whl | xargs -n 1 basename | sed "s/-/+$tmpname-/2")
          ls dist/*whl |xargs -I {} mv {} dist/${wheel_name}
          echo "wheel_name=${wheel_name}" >> $GITHUB_ENV
          ls dist

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: github.event_name != 'release'
        with:
          name: ${{env.wheel_name}}
          path: dist/${{env.wheel_name}}
          if-no-files-found: error

      - name: Upload wheels to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@6da8fa9354ddfdc4aeace5fc48d7f679b5214090 # v2.4.1
        with:
          files: ./dist/*.whl
          tag_name: ${{ github.ref_name }}
          append_body: true
