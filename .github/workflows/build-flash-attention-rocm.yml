name: FlashAttention-ROCm

permissions: {}

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      FLASH_ATTENTION_VERSION:
        description: "FlashAttention version"
        required: true
        default: "v2.8.3"
        type: string
  release:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  plan-matrix:
    name: Plan FlashAttention ROCm build matrix
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    permissions:
      contents: read # for actions/checkout
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v6

      - name: Generate build matrix
        id: generate-matrix
        run: |
          echo "matrix=$(uv run --script plan-matrix-rocm.py)" >> $GITHUB_OUTPUT

  build-wheels:
    name: Build Wheel
    needs: [plan-matrix]
    runs-on: ${{ matrix.RUNNER }}
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}

    permissions:
      contents: write
      actions: write

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan-matrix.outputs.matrix) }}

    steps:
      - name: Determine FlashAttention version
        id: flash-attention-version
        run: |
          # Extract FlashAttention version from tag. Tags can be either:
          # - v2.8.3 (legacy format; maps directly to FlashAttention version)
          # - v2.8.3-r1 (new format; strip -rN suffix to get FlashAttention version)
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            TAG="${GITHUB_REF_NAME}"
            # Remove -rN suffix if present
            FLASH_ATTENTION_VERSION="${TAG%-r*}"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            FLASH_ATTENTION_VERSION="${INPUTS_FLASH_ATTENTION_VERSION}"
          else
            FLASH_ATTENTION_VERSION="v2.8.3"
          fi
          echo "version=${FLASH_ATTENTION_VERSION}" >> $GITHUB_OUTPUT
          echo "Using FlashAttention version: ${FLASH_ATTENTION_VERSION}"
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          INPUTS_FLASH_ATTENTION_VERSION: ${{ inputs.FLASH_ATTENTION_VERSION }}

      - name: Checkout Flash Attention
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: Dao-AILab/flash-attention
          ref: ${{ steps.flash-attention-version.outputs.version }}
          persist-credentials: false
          submodules: true

      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.13"

      - name: Checkout build scripts
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          path: build_scripts
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v6
        with:
          enable-cache: false

      - name: Set environment variables
        run: |
          echo "MATRIX_ROCM_VERSION=${{ matrix.MATRIX_ROCM_VERSION }}" >> $GITHUB_ENV
          echo "MATRIX_TORCH_VERSION=${{ matrix.MATRIX_TORCH_VERSION }}" >> $GITHUB_ENV
          echo "MATRIX_PYTHON_VERSION=${{ matrix.MATRIX_PYTHON_VERSION }}" >> $GITHUB_ENV

      - name: Install cibuildwheel
        run: |
          uv venv --python 3.13
          uv pip install cibuildwheel

      - name: Build wheels for FlashAttention ${{ matrix.torch-version }}+rocm${{ matrix.rocm-version }}
        run: |
          .venv/bin/cibuildwheel --output-dir dist
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.target-arch }}
          CIBW_BUILD: cp${{ env.MATRIX_PYTHON_VERSION }}-*64
          CIBW_MANYLINUX_X86_64_IMAGE: ${{ matrix.DOCKER_IMAGE }}
          CIBW_BEFORE_ALL: >
            git config --global --add safe.directory "*"
          CIBW_BEFORE_BUILD_LINUX: >
            pip install ninja packaging setuptools wheel
          CIBW_ENVIRONMENT: >
            GPU_ARCHS="${{ matrix.GPU_ARCHS }}"
            PYTORCH_ROCM_ARCH="${{ matrix.GPU_ARCHS }}"
            FLASH_ATTENTION_FORCE_BUILD="TRUE"
            FLASH_ATTENTION_FORCE_CXX11_ABI=${{ matrix.cxx11-abi }}
            BUILD_TARGET="rocm"
            MAX_JOBS=8
          CIBW_SKIP: "*musllinux*"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel repair -w {dest_dir} {wheel}
            --exclude libc10.so
            --exclude libc10_hip.so
            --exclude libtorch.so
            --exclude libtorch_python.so
            --exclude libtorch_cpu.so
            --exclude libtorch_hip.so
            --exclude libamdhip64.so
            --exclude libamdhip64.so.6
            --exclude libhiprtc.so
            --exclude libhiprtc.so.6
            --exclude librocblas.so
            --exclude librocblas.so.4
            --exclude libhsa-runtime64.so.1
            --exclude libamd_comgr.so.2
          CIBW_BUILD_FRONTEND: "build; args: --no-isolation"

      - name: Log Built Wheels
        run: |
          wheel_name=$(ls dist/*whl | xargs -n 1 basename)
          echo "wheel_name=${wheel_name}" >> $GITHUB_ENV
          ls -lh dist

      - name: Rename wheel
        run: |
          # Add ROCm version and CXX11 ABI info to wheel name
          tmpname=rocm${{ matrix.rocm-version }}torch${{ matrix.torch-version }}cxx11abi${{ matrix.cxx11-abi }}
          original_wheel=$(ls dist/*whl | xargs -n 1 basename)
          # Insert the custom name after the version number
          new_wheel=$(echo "${original_wheel}" | sed "s/-/+${tmpname}-/2")
          mv dist/${original_wheel} dist/${new_wheel}
          echo "wheel_name=${new_wheel}" >> $GITHUB_ENV
          ls -lh dist

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: github.event_name != 'release'
        with:
          name: ${{env.wheel_name}}
          path: dist/${{env.wheel_name}}
          if-no-files-found: error

      - name: Upload wheels to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@6da8fa9354ddfdc4aeace5fc48d7f679b5214090 # v2.4.1
        with:
          files: ./dist/*.whl
          tag_name: ${{ github.ref_name }}
          append_body: true
